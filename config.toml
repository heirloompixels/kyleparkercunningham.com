# The URL the site will be built for.
# NOTE: still on the brain. subdomain until the apex DNS cutover. To go live on
# the apex, change this to https://kyleparkercunningham.com AND set static/CNAME
# to kyleparkercunningham.com — but only after apex DNS points at GitHub Pages.
base_url = "https://brain.kyleparkercunningham.com"

# The site title and description; used in feeds by default.
title = "The art of Kyle Parker Cunningham"
description = "Artist portfolio featuring painting, printmaking, and cinema"

# The default language; used in feeds.
default_language = "en"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = false

# The taxonomies to be rendered for the site and their configuration.
# Only `topics` is used (by the notes section); the others were declared but
# never populated, so they produced empty index pages.
taxonomies = [
  {name = "topics", feed = true},
]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
# highlight_code = false

[extra]
# Put all your custom variables here
author = "Kyle Parker Cunningham"
email = "analogkyle@gmail.com"
