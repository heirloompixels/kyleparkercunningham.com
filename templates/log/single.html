{% extends "base.html" %}
{% block title %}{{ page.title }} - {{ config.title }}{% endblock %}
{% block content %}
<section class="home-hero">
  <p class="home-eyebrow">Log</p>
  <h1>{{ page.title }}</h1>
  {% if page.date %}<p class="home-deck">{{ page.date | date(format="%Y-%m-%d") }}</p>{% endif %}
</section>

{% if page.content %}
  <section class="project-content">
    {{ page.content | safe }}
  </section>
{% endif %}
{% endblock %}
