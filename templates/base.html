<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300..700;1,7..72,300..700&family=IBM+Plex+Sans:wght@300;400;500;600&family=Inconsolata:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ get_url(path='/style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    {% block site_header %}
    {% include "partials/masthead.html" %}
    {% endblock %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block site_footer %}
    {% include "partials/colophon.html" %}
    {% endblock %}
</body>
</html>
