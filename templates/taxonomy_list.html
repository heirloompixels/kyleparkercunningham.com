{% extends "base.html" %}
{% block title %}{{ taxonomy.name | title }}{% endblock %}
{% block content %}
<h1>{{ taxonomy.name | title }}</h1>
<ul class="latest-list">
  {% for item in terms %}
    <li>
      <a href="{{ item.permalink }}">{{ item.name | title }}</a>
      <span class="latest-year">{{ item.pages | length }}</span>
    </li>
  {% endfor %}
</ul>
{% endblock %}
